<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Portal | Sneakr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card" aria-label="Authentication card">
      <header class="auth-header">
        <p class="brand">SNEAKR.LAB</p>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in or create an account to continue.</p>
      </header>

      <div class="auth-tabs" role="tablist" aria-label="Authentication forms">
        <button id="loginTab" class="tab active" type="button" role="tab" aria-selected="true" aria-controls="loginPanel">Login</button>
        <button id="signupTab" class="tab" type="button" role="tab" aria-selected="false" aria-controls="signupPanel">Sign Up</button>
      </div>

      <section id="loginPanel" class="panel active" role="tabpanel" aria-labelledby="loginTab">
        <form id="loginForm" novalidate>
          <div class="field-group">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="loginEmail" type="email" placeholder="you@company.com" autocomplete="email" required />
            <small class="error" data-for="loginEmail"></small>
          </div>

          <div class="field-group">
            <label for="loginPassword">Password</label>
            <div class="password-wrap">
              <input id="loginPassword" name="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" required />
              <button class="icon-toggle" type="button" data-target="loginPassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5c-5.2 0-9.4 3.3-11 7 1.6 3.7 5.8 7 11 7s9.4-3.3 11-7c-1.6-3.7-5.8-7-11-7zm0 11.2A4.2 4.2 0 1 1 12 7.8a4.2 4.2 0 0 1 0 8.4zm0-6.8a2.6 2.6 0 1 0 0 5.2 2.6 2.6 0 0 0 0-5.2z" />
                </svg>
              </button>
            </div>
            <small class="error" data-for="loginPassword"></small>
          </div>

          <div class="row-actions">
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button class="btn-primary" type="submit">Log In</button>
        </form>
      </section>

      <section id="signupPanel" class="panel" role="tabpanel" aria-labelledby="signupTab" hidden>
        <form id="signupForm" novalidate>
          <div class="field-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" placeholder="Alex Morgan" autocomplete="name" required />
            <small class="error" data-for="fullName"></small>
          </div>

          <div class="field-group">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" name="signupEmail" type="email" placeholder="you@company.com" autocomplete="email" required />
            <small class="error" data-for="signupEmail"></small>
          </div>

          <div class="field-group">
            <label for="signupPassword">Password</label>
            <div class="password-wrap">
              <input id="signupPassword" name="signupPassword" type="password" placeholder="Create a strong password" autocomplete="new-password" required />
              <button class="icon-toggle" type="button" data-target="signupPassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5c-5.2 0-9.4 3.3-11 7 1.6 3.7 5.8 7 11 7s9.4-3.3 11-7c-1.6-3.7-5.8-7-11-7zm0 11.2A4.2 4.2 0 1 1 12 7.8a4.2 4.2 0 0 1 0 8.4zm0-6.8a2.6 2.6 0 1 0 0 5.2 2.6 2.6 0 0 0 0-5.2z" />
                </svg>
              </button>
            </div>
            <small class="error" data-for="signupPassword"></small>
          </div>

          <div class="field-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrap">
              <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your password" autocomplete="new-password" required />
              <button class="icon-toggle" type="button" data-target="confirmPassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5c-5.2 0-9.4 3.3-11 7 1.6 3.7 5.8 7 11 7s9.4-3.3 11-7c-1.6-3.7-5.8-7-11-7zm0 11.2A4.2 4.2 0 1 1 12 7.8a4.2 4.2 0 0 1 0 8.4zm0-6.8a2.6 2.6 0 1 0 0 5.2 2.6 2.6 0 0 0 0-5.2z" />
                </svg>
              </button>
            </div>
            <small class="error" data-for="confirmPassword"></small>
          </div>

          <button class="btn-primary" type="submit">Create Account</button>
        </form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

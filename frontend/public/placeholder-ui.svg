<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#F7F8FA"/>

  <!-- Monitor body -->
  <rect x="60" y="48" width="280" height="195" rx="10" ry="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>

  <!-- Monitor screen -->
  <rect x="72" y="60" width="256" height="171" rx="5" ry="5" fill="#EFF2F7"/>

  <!-- Top bar in screen -->
  <rect x="72" y="60" width="256" height="22" rx="5" ry="5" fill="#E2E8F0"/>
  <circle cx="89" cy="71" r="4" fill="#CBD5E0"/>
  <circle cx="103" cy="71" r="4" fill="#CBD5E0"/>
  <circle cx="117" cy="71" r="4" fill="#CBD5E0"/>
  <!-- Search bar placeholder -->
  <rect x="140" y="64" width="100" height="14" rx="7" fill="#D1D5DB"/>

  <!-- Left sidebar -->
  <rect x="72" y="82" width="52" height="149" fill="#E9EEF5"/>
  <!-- Sidebar items -->
  <rect x="80" y="94" width="34" height="8" rx="4" fill="#CBD5E0"/>
  <rect x="80" y="110" width="28" height="8" rx="4" fill="#B8C4D0"/>
  <rect x="80" y="126" width="34" height="8" rx="4" fill="#CBD5E0"/>
  <rect x="80" y="142" width="22" height="8" rx="4" fill="#B8C4D0"/>
  <rect x="80" y="158" width="30" height="8" rx="4" fill="#CBD5E0"/>
  <!-- Sidebar avatar placeholder -->
  <circle cx="96" cy="210" r="12" fill="#C7D2DE"/>

  <!-- Main content area -->
  <!-- Hero image placeholder -->
  <rect x="134" y="88" width="186" height="68" rx="5" fill="#D6E4F5"/>
  <!-- Diagonal stripe decoration -->
  <line x1="134" y1="88" x2="320" y2="156" stroke="#C0D4EA" stroke-width="1.2"/>
  <line x1="155" y1="88" x2="320" y2="135" stroke="#C0D4EA" stroke-width="1.2"/>
  <line x1="134" y1="110" x2="305" y2="156" stroke="#C0D4EA" stroke-width="1.2"/>
  <!-- Image icon -->
  <circle cx="220" cy="118" r="10" fill="#A8C4DF"/>
  <polygon points="205,134 215,120 225,130 232,124 241,134" fill="#A8C4DF"/>

  <!-- Card row -->
  <rect x="134" y="164" width="56" height="58" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="140" y="170" width="44" height="24" rx="3" fill="#D6E4F5"/>
  <rect x="140" y="200" width="32" height="6" rx="3" fill="#CBD5E0"/>
  <rect x="140" y="211" width="24" height="5" rx="2.5" fill="#D1D5DB"/>

  <rect x="198" y="164" width="56" height="58" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="204" y="170" width="44" height="24" rx="3" fill="#BFDBFE"/>
  <rect x="204" y="200" width="32" height="6" rx="3" fill="#CBD5E0"/>
  <rect x="204" y="211" width="24" height="5" rx="2.5" fill="#D1D5DB"/>

  <rect x="262" y="164" width="44" height="58" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="268" y="170" width="32" height="24" rx="3" fill="#D6E4F5"/>
  <rect x="268" y="200" width="22" height="6" rx="3" fill="#CBD5E0"/>
  <rect x="268" y="211" width="16" height="5" rx="2.5" fill="#D1D5DB"/>

  <!-- Monitor stand neck -->
  <rect x="183" y="243" width="34" height="18" rx="3" fill="#D1D5DB"/>

  <!-- Monitor base -->
  <rect x="148" y="258" width="104" height="12" rx="6" fill="#CBD5E0"/>

  <!-- Floating badge bottom-right -->
  <rect x="252" y="280" width="96" height="36" rx="10" fill="#3B82F6" opacity="0.9"/>
  <rect x="266" y="291" width="46" height="6" rx="3" fill="#FFFFFF" opacity="0.9"/>
  <rect x="266" y="302" width="30" height="5" rx="2.5" fill="#BFDBFE" opacity="0.8"/>

  <!-- Floating badge bottom-left -->
  <rect x="52" y="280" width="88" height="36" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <circle cx="70" cy="298" r="8" fill="#BFDBFE"/>
  <rect x="84" y="291" width="44" height="6" rx="3" fill="#CBD5E0"/>
  <rect x="84" y="302" width="28" height="5" rx="2.5" fill="#D1D5DB"/>

  <!-- Small dots decoration -->
  <circle cx="38" cy="80" r="3" fill="#D1D5DB"/>
  <circle cx="52" cy="80" r="3" fill="#D1D5DB"/>
  <circle cx="38" cy="94" r="3" fill="#D1D5DB"/>
  <circle cx="52" cy="94" r="3" fill="#D1D5DB"/>
  <circle cx="38" cy="108" r="3" fill="#D1D5DB"/>
  <circle cx="52" cy="108" r="3" fill="#D1D5DB"/>

  <circle cx="348" cy="176" r="3" fill="#BFDBFE"/>
  <circle cx="362" cy="176" r="3" fill="#BFDBFE"/>
  <circle cx="348" cy="190" r="3" fill="#BFDBFE"/>
  <circle cx="362" cy="190" r="3" fill="#BFDBFE"/>
  <circle cx="348" cy="204" r="3" fill="#BFDBFE"/>
  <circle cx="362" cy="204" r="3" fill="#BFDBFE"/>

  <!-- Cursor icon -->
  <polygon points="338,72 338,90 342,86 346,94 349,93 345,85 351,85" fill="#3B82F6" opacity="0.75"/>
</svg>
